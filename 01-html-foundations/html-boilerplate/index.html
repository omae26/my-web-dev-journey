<!-- HTML - Hpertext Markup Language -->
<!-- HTML tags tell the browser what content an element contains -->
<!-- There are also void elements like <img> and <br> that do not wrap any content-->
<!-- The HTML file that contains the homepage of any website should always be index.html 
 This is because web servers will alwasy by default look for an index.html page
 when users land on our websites-->

<!-- <html> is the root element in any html file -->
<!-- lang tag specifies the language of the document -->
<!-- <head> element is where you put meta information about your webpages, and stuff
    required for your web pages to render correctly in the browser.
    Inside this head tag, you should not use any element that displays the content
    on the webpage 
    Th <title> element should be included in the head element-->
<!-- All contents of the website go in the <body> element -->

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>My First Webpage</title>
    </head>

    <body>
        My First Webpage!
    </body>

</html>
