<!DOCTYPE html>
<html lang=""en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links and Images</title>
</head>
<body>
    <h1>Homepage</h1>

    <!-- We use the anchor element <a> to create links in HTML -->
        <a>Click me</a>
    <!-- An anchor element cannot work on it's own, you need to tell the link
     where it should go. To this, we use the href attribute.
     The value of the href attribute is the destination where you want the
     link to go to -->
        <a href="https://www.theodinproject.com/about">Click me</a>

    <!-- We can use anchor elements to link to any kind of resources on the
     internet: videos, photos,pdf files, images etc but mostly we shall use them
     to link to other HTML documents -->
    
     <!--An HTML attribute gives additional information about and HTML element.
     It goes in the elements opening tag.   -->

     <!--There are 2 types of links in HTML: External and internal links  -->
     <!-- External links referred to as Absolute links, have a protocol and domain 
      of the destination. They link to other websites or resources on the web-->
      <!--Internal links,referred to relative links, link to other pages 
      within your website. They only include the filepath to the other page.  -->

    <a href="pages/about.html" >About page</a>   

    <!-- or this too <a href="./pages/about.html">About</a> -->

    <img src="images/dog.jpg">
    <!-- To display an image in HTML, we use the <img> element -->
     <!-- It is a void element as it doesn't have a closing tag -->
      <!-- It embeds an image to the page using an src attribute which tells
       the browser where the image file is located -->
       <!-- It embeds an image using both absolute and relative paths -->

    <!-- If we want to use the dog image in the about page, we use this code 
       <img src="../images/dog.jpg"> -->
   
    <!-- i.e We get into links-and-images directory, then into images directory
     then to the image file -->

    <!-- Besides the src attribute, we also use the alt attribute -->
     <!-- It is used to describe an image. It's used if the image cannot be loaded -->
        <img src="images/dog.jpg" alt="A black dog">
</body>
